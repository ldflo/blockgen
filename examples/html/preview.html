<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; padding: 2rem; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 0.5rem 1rem; text-align: left; }
        th { background-color: #f0f0f0; }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>
    <h1>Preview of <a href="data.csv"><strong><code>data.csv</code></strong></a></h1>
    <table>
        <thead>
            <tr>
                <!-- <<[ headers ]>> -->
                <th>Name</th>
                <th>Age</th>
                <th>City</th>
                <th>Occupation</th>
                <!-- <<[ end ]>> -->
            </tr>
        </thead>
        <tbody>
            <!-- <<[ rows ]>> -->
            <tr><td>Alice</td><td>28</td><td>New York</td><td>Engineer</td></tr>
            <tr><td>Bob</td><td>34</td><td>London</td><td>Designer</td></tr>
            <tr><td>Carol</td><td>41</td><td>Paris</td><td>Manager</td></tr>
            <tr><td>David</td><td>25</td><td>Tokyo</td><td>Developer</td></tr>
            <tr><td>Eva</td><td>37</td><td>Sydney</td><td>Analyst</td></tr>
            <!-- <<[ end ]>> -->
        </tbody>
    </table>
</body>
</html>
